services:
  deltaroutes-db:
    image: postgres:16-alpine
    container_name: deltaroutes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deltaroutes
      POSTGRES_USER: deltaroutes_user
      POSTGRES_PASSWORD: delta7465834754routes
    volumes:
      - deltaroutes_postgres_data:/var/lib/postgresql/data
    networks:
      - deltaroutes-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deltaroutes_user -d deltaroutes"]
      interval: 10s
      timeout: 5s
      retries: 5

  deltaroutes-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deltaroutes-app
    restart: unless-stopped
    depends_on:
      deltaroutes-db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://deltaroutes_user:delta7465834754routes@deltaroutes-db:5432/deltaroutes
      SHADOW_DATABASE_URL: postgresql://deltaroutes_user:delta7465834754routes@deltaroutes-db:5432/deltaroutes_shadow
    networks:
      - deltaroutes-internal
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.deltaroutes.rule=Host(`deltaroutes.marcespana.com`)"
      - "traefik.http.routers.deltaroutes.entrypoints=websecure"
      - "traefik.http.routers.deltaroutes.tls=true"
      - "traefik.http.services.deltaroutes.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-proxy"

volumes:
  deltaroutes_postgres_data:

networks:
  deltaroutes-internal:
    driver: bridge
  traefik-proxy:
    external: true
